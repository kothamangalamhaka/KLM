<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haka Rentals (P) Ltd - MNC Style Grid</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-dark-blue: #0a1f44;
            --bg-gradient-end: #1a3a6c;
            --primary-accent: #00CED1;
            --secondary-accent: #FFC300;
            --text-white: #ffffff;
            --font-inter: 'Inter', sans-serif;
            --font-montserrat: 'Montserrat', sans-serif;
            --transition-speed: 0.4s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark-blue);
            background-image: radial-gradient(circle at top right, rgba(0, 206, 209, 0.05) 0%, rgba(0, 0, 0, 0) 60%),
                radial-gradient(circle at bottom left, rgba(255, 195, 0, 0.05) 0%, rgba(0, 0, 0, 0) 60%),
                linear-gradient(135deg, var(--bg-dark-blue), var(--bg-gradient-end));
            color: var(--text-white);
            font-family: var(--font-inter);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 50px 20px;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* Animations */
        .animate {
            opacity: 0;
            animation: fadeInUp var(--transition-speed) ease forwards;
        }

        .animate-title {
            animation-delay: 0.2s;
        }

        .animate-connect {
            animation-delay: 0.4s;
        }

        .animate-actions {
            animation-delay: 0.6s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.2rem;
            margin-bottom: 4rem;
            text-align: center;
            letter-spacing: 2px;
            font-weight: 700;
            font-family: var(--font-montserrat);
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 30%, #a0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 850px;
        }

        .connect-btn {
            display: inline-block;
            text-decoration: none;
            background: var(--secondary-accent);
            color: var(--bg-dark-blue);
            padding: 16px 45px;
            border-radius: 40px;
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 4rem;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-speed) ease;
        }

        .connect-btn:hover {
            background-color: #ffd700;
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
        }

        .action-btns-box {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 100%;
            max-width: 700px;
        }

        .action-btn {
            display: block;
            text-decoration: none;
            background: var(--primary-accent);
            color: var(--text-white);
            padding: 18px 20px;
            border-radius: 35px;
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            transition: all var(--transition-speed) ease;
            border: none;
            cursor: pointer;
        }

        .action-btn:hover {
            background-color: #00aaaa;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        @media (max-width: 650px) {
            h1 {
                font-size: 2.5rem;
            }

            .action-btns-box {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <h1 class="animate animate-title">Haka Rentals (P) Ltd</h1>

    <main>
        <div class="action-btns-box animate animate-actions">
            <a href="https://script.google.com/macros/s/AKfycbyFKsLnL2tBxHWPX15Y-nReqJvhBcAAYWxu0XQW2wqd/dev"
                class="action-btn">2026</a>
            <a href="" class="action-btn">2027</a>
        </div>
    </main>

</body>

</html>
